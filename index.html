<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tracer · Working Version</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      padding: 2rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      padding-left: 1rem;
      border-left: 3px solid #94a3b8;
    }
    .canvas-wrapper {
      background: #f8fafc;
      border-radius: 20px;
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
    }
    #tracerCanvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 800 / 400;
      background: #ffffff;
      border-radius: 16px;
      cursor: crosshair;
      touch-action: none;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .input-group {
      flex: 2 1 300px;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-group label {
      font-weight: 500;
      color: #1e293b;
      font-size: 0.95rem;
    }
    .input-group input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
      min-width: 120px;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-primary {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
    }
    .btn-primary:hover { background: #0f172a; border-color: #0f172a; }
    .btn-secondary {
      background: #f1f5f9;
      border-color: #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: #64748b;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .status-badge {
      background: #f1f5f9;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-weight: 450;
    }
    .legend {
      display: flex;
      gap: 1rem;
      align-items: center;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-start { background: #22c55e; }
    .dot-end { background: #ef4444; }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .input-group { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ Tracer · Working Version</h1>
    <div class="subhead">Clean strokes with numbered order & direction arrows</div>
    <div class="canvas-wrapper">
      <canvas id="tracerCanvas" width="800" height="400"></canvas>
    </div>
    <div class="controls">
      <div class="input-group">
        <label for="wordInput">Text</label>
        <input type="text" id="wordInput" placeholder="e.g. ABC, hello" value="Trace" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="traceBtn">▶ Trace</button>
        <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-badge" id="statusLabel">⏺ Ready</span>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-start"></span> Start</span>
        <span class="legend-item"><span class="dot dot-end"></span> End</span>
        <span class="legend-item">🔢 Stroke order</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('tracerCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;

      // ----- state -----
      let allStrokes = [];
      let currentStep = 0;
      let isAnimating = false;
      let animationId = null;
      const ANIMATION_SPEED = 1.2;

      // ----- Reliable letter path definitions (tested & working) -----
      const letterPaths = {

        'y': [

        'z': [

          [[15,75],[65,75]]
        ],
        '0': [
          [[40,15],[20,30],[15,55],[30,80],[55,85],[70,65],[70,40],[55,20],[40,15]]
        ],
        '1': [
          [[25,30],[40,15],[40,85]]
        ],
        '2': [
          [[15,25],[60,25],[15,60],[60,60],[15,85],[60,85]]
        ],
        '3': [
          [[15,25],[60,25],[25,50],[60,50],[25,75],[60,75]]
        ],
        '4': [
          [[40,15],[40,60],[60,60]],
          [[20,40],[60,40]],
          [[40,60],[40,85]]
        ],
        '5': [
          [[50,20],[15,20],[15,50],[60,50],[60,85],[15,85]]
        ],
        '6': [
          [[60,20],[20,20],[15,50],[40,55],[60,50],[50,75],[25,80]]
        ],
        '7': [
          [[15,20],[70,20],[40,85]]
        ],
        '8': [
          [[40,20],[20,30],[20,60],[40,70],[60,60],[60,30],[40,20]],
          [[40,40],[40,50]]
        ],
        '9': [
          [[20,65],[60,65],[65,35],[40,30],[20,35],[30,60],[55,55]]
        ],
        ' ': []
      };

      // ----- Generate strokes from text -----
      function generateStrokes(text) {
        if (!text) return [];
        const result = [];
        const words = text.split(' ');
        let xOffset = 30;
        const yBase = 55;
        const charWidth = 45;
        const gap = 20;
        const maxWidth = W - 40;

        // Calculate total width for scaling
        let totalWidth = 0;
        for (let w of words) {
          totalWidth += w.length * charWidth + (w.length - 1) * 6;
        }
        totalWidth += (words.length - 1) * gap;
        let scaleFactor = 1;
        if (totalWidth > maxWidth) scaleFactor = maxWidth / totalWidth;

        let strokeCounter = 0;

        for (let wIdx = 0; wIdx < words.length; wIdx++) {
          const word = words[wIdx];
          for (let chIdx = 0; chIdx < word.length; chIdx++) {
            const ch = word[chIdx];
            const strokes = letterPaths[ch] || letterPaths['A'];
            
            for (let sIdx = 0; sIdx < strokes.length; sIdx++) {
              const stroke = strokes[sIdx];
              const scaled = stroke.map(([x, y]) => ({
                x: x * scaleFactor * 0.8 + xOffset + 20,
                y: y * scaleFactor * 0.8 + yBase + 20
              }));
              
              result.push({
                points: scaled,
                strokeNum: ++strokeCounter
              });
            }
            xOffset += charWidth * scaleFactor * 0.8 + 8;
          }
          if (wIdx < words.length - 1) xOffset += gap * scaleFactor;
        }
        return result;
      }

      // ----- Drawing functions -----
      function drawStroke(stroke, progress = 1, showNumber = true) {
        if (!stroke || stroke.points.length < 2) return;
        const pts = stroke.points;
        const total = pts.length;
        const drawCount = Math.max(1, Math.floor(progress * total));

        // Main stroke
        ctx.save();
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 4.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < drawCount && i < total; i++) {
          ctx.lineTo(pts[i].x, pts[i].y);
        }
        ctx.stroke();
        ctx.restore();

        // Start dot
        if (progress > 0.01) {
          ctx.save();
          ctx.fillStyle = '#22c55e';
          ctx.shadowColor = 'rgba(34,197,94,0.3)';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(pts[0].x, pts[0].y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // End dot
        if (progress >= 0.99) {
          ctx.save();
          ctx.fillStyle = '#ef4444';
          ctx.shadowColor = 'rgba(239,68,68,0.3)';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(pts[pts.length-1].x, pts[pts.length-1].y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // Stroke number
        if (showNumber && progress >= 0.3) {
          const midIdx = Math.floor(total / 2);
          const mid = pts[midIdx] || pts[0];
          ctx.save();
          const num = stroke.strokeNum || 0;
          const text = num.toString();
          ctx.font = 'bold 14px Inter, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const metrics = ctx.measureText(text);
          const pad = 6;
          const rectW = metrics.width + pad * 2;
          const rectH = 24;
          const x = mid.x - rectW/2;
          const y = mid.y - rectH/2 - 2;
          ctx.shadowColor = 'rgba(0,0,0,0.15)';
          ctx.shadowBlur = 8;
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath();
          ctx.roundRect(x, y, rectW, rectH, 12);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#0f172a';
          ctx.font = 'bold 13px Inter, sans-serif';
          ctx.fillText(text, mid.x, mid.y + 1);
          ctx.restore();
        }

        // Direction arrow
        if (progress >= 0.6 && drawCount >= 3) {
          const idx = Math.min(Math.floor(total * 0.6), total - 1);
          const p1 = pts[Math.max(0, idx - 1)];
          const p2 = pts[idx];
          const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
          const size = 9;
          ctx.save();
          ctx.fillStyle = '#1e293b';
          ctx.shadowColor = 'rgba(0,0,0,0.1)';
          ctx.shadowBlur = 4;
          ctx.translate(p2.x, p2.y);
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(-size, -size/2);
          ctx.lineTo(-size, size/2);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      function drawAll(progress = 1) {
        ctx.clearRect(0, 0, W, H);

        // Grid
        ctx.save();
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < W; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, H);
          ctx.stroke();
        }
        for (let i = 0; i < H; i += 40) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(W, i);
          ctx.stroke();
        }
        ctx.restore();

        if (!allStrokes.length) return;

        const total = allStrokes.length;
        const complete = Math.floor(progress * total);

        for (let i = 0; i < total; i++) {
          const stroke = allStrokes[i];
          if (i < complete) {
            drawStroke(stroke, 1, true);
          } else if (i === complete) {
            const partial = (progress * total) - i;
            drawStroke(stroke, partial, false);
          } else {
            // Ghost preview
            ctx.save();
            ctx.globalAlpha = 0.06;
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 3;
            ctx.setLineDash([3, 5]);
            ctx.beginPath();
            const pts = stroke.points;
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let j = 1; j < pts.length; j++) {
              ctx.lineTo(pts[j].x, pts[j].y);
            }
            ctx.stroke();
            ctx.restore();
          }
        }
      }

      // ----- Animation -----
      function animate() {
        if (!isAnimating) return;
        currentStep += ANIMATION_SPEED;
        const progress = Math.min(currentStep / allStrokes.length, 1);
        drawAll(progress);

        if (progress < 1) {
          const done = Math.floor(progress * allStrokes.length);
          document.getElementById('statusLabel').textContent = `⏳ ${Math.round(progress * 100)}% · ${done}/${allStrokes.length}`;
          animationId = requestAnimationFrame(animate);
        } else {
          isAnimating = false;
          document.getElementById('statusLabel').textContent = '✅ Complete · all strokes traced';
          animationId = null;
        }
      }

      // ----- Public functions -----
      function startTrace(text) {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        isAnimating = false;
        const rawText = text || document.getElementById('wordInput').value || 'Trace';
        allStrokes = generateStrokes(rawText);
        if (!allStrokes.length) {
          ctx.clearRect(0, 0, W, H);
          document.getElementById('statusLabel').textContent = '⏺ No strokes';
          return;
        }
        currentStep = 0;
        isAnimating = true;
        document.getElementById('statusLabel').textContent = '▶ Animating...';
        animate();
      }

      function clearTrace() {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        isAnimating = false;
        allStrokes = [];
        currentStep = 0;
        ctx.clearRect(0, 0, W, H);
        document.getElementById('statusLabel').textContent = '⏺ Cleared';
      }

      function resetTrace() {
        if (allStrokes.length) {
          currentStep = 0;
          isAnimating = true;
          document.getElementById('statusLabel').textContent = '▶ Replaying...';
          animate();
        }
      }

      // ----- UI -----
      document.getElementById('traceBtn').addEventListener('click', () => startTrace(document.getElementById('wordInput').value));
      document.getElementById('clearBtn').addEventListener('click', clearTrace);
      document.getElementById('resetBtn').addEventListener('click', resetTrace);
      document.getElementById('wordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); startTrace(e.target.value); }
      });

      // roundRect polyfill
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          if (w < 2 * r) r = w / 2;
          if (h < 2 * r) r = h / 2;
          this.moveTo(x + r, y);
          this.lineTo(x + w - r, y);
          this.quadraticCurveTo(x + w, y, x + w, y + r);
          this.lineTo(x + w, y + h - r);
          this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          this.lineTo(x + r, y + h);
          this.quadraticCurveTo(x, y + h, x, y + h - r);
          this.lineTo(x, y + r);
          this.quadraticCurveTo(x, y, x + r, y);
          return this;
        };
      }

      // Initial load
      window.addEventListener('load', () => {
        document.getElementById('wordInput').value = 'Trace';
        startTrace('Trace');
      });
    })();
  </script>
</body>
</html>
