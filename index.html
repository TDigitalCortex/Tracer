<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tracer · tscircuit/alphabet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
    }
    h1 { font-size: 1.6rem; font-weight: 600; color: #0f172a; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.75rem; }
    .subhead { color: #64748b; font-size: 0.95rem; margin-bottom: 1.5rem; padding-left: 1rem; border-left: 3px solid #94a3b8; }
    .display-area {
      background: #f8fafc;
      border-radius: 20px;
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
      min-height: 400px;
      overflow: auto;
      max-height: 600px;
    }
    #svgContainer {
      width: 100%;
      min-height: 400px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #ffffff;
      border-radius: 16px;
      padding: 10px 0;
      position: relative;
    }
    #svgContainer svg {
      width: 100%;
      height: auto;
      display: block;
      background: white;
      max-width: 100%;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .input-group {
      flex: 2 1 300px;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-group label { font-weight: 500; color: #1e293b; font-size: 0.95rem; }
    .input-group input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
      min-width: 120px;
    }
    .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
    .btn-group { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-primary { background: #1e293b; border-color: #1e293b; color: white; }
    .btn-primary:hover { background: #0f172a; border-color: #0f172a; }
    .btn-secondary { background: #f1f5f9; border-color: #e2e8f0; }
    .btn-secondary:hover { background: #e2e8f0; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: #64748b;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .status-badge { background: #f1f5f9; padding: 0.2rem 1rem; border-radius: 40px; font-weight: 450; }
    .legend { display: flex; gap: 1rem; align-items: center; font-size: 0.8rem; }
    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-start { background: #22c55e; }
    .dot-end { background: #ef4444; }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .input-group { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ Letter Tracer</h1>
    <div class="subhead">Using @tscircuit/alphabet · Full alphabet</div>
    <div class="display-area">
      <div id="svgContainer"></div>
    </div>
    <div class="controls">
      <div class="input-group">
        <label for="wordInput">Text</label>
        <input type="text" id="wordInput" placeholder="e.g. ABC, hello" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="traceBtn">▶ Trace</button>
        <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-badge" id="statusLabel">⏺ Ready</span>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-start"></span> Start</span>
        <span class="legend-item"><span class="dot dot-end"></span> End</span>
        <span class="legend-item">🔢 Stroke order</span>
      </div>
    </div>
  </div>

  <!-- Load KanjiVgAnimate library -->
  <script src="https://cdn.jsdelivr.net/npm/kanjivganimate@0.2.1/dist/kanjivganimate.min.js"></script>

  <!-- Load @tscircuit/alphabet as ES Module -->
  <script type="importmap">
    {
      "imports": {
        "@tscircuit/alphabet": "https://cdn.jsdelivr.net/npm/@tscircuit/alphabet@0.0.7/+esm"
      }
    }
  </script>

  <script type="module">
    // Import the alphabet library
    import { svgAlphabet, lineAlphabet, fillAlphabet } from '@tscircuit/alphabet';

    const container = document.getElementById('svgContainer');
    const statusLabel = document.getElementById('statusLabel');
    const inputField = document.getElementById('wordInput');

    // ----- Generate SVG from text using @tscircuit/alphabet -----
    function generateSVG(text) {
      if (!text) return null;

      const containerWidth = container.clientWidth || 780;
      const svgWidth = Math.min(containerWidth, 780);
      const padding = 30;
      const maxWidth = svgWidth - (padding * 2);
      const lineHeight = 90;
      const yBase = 55;
      const charWidth = 45;
      const charSpacing = 12;
      const scale = 0.9;

      // Split text into characters
      const chars = [];
      for (let ch of text) {
        chars.push({ char: ch });
      }

      // Layout characters into lines
      const lines = [];
      let currentLine = [];
      let currentWidth = 0;

      for (let i = 0; i < chars.length; i++) {
        const charData = chars[i];
        const spacing = currentLine.length > 0 ? charSpacing : 0;
        const testWidth = currentWidth + charWidth + spacing;

        if (testWidth <= maxWidth) {
          currentLine.push(charData);
          currentWidth = testWidth;
        } else {
          if (currentLine.length > 0) {
            lines.push(currentLine);
          }
          currentLine = [charData];
          currentWidth = charWidth;
        }
      }
      if (currentLine.length > 0) {
        lines.push(currentLine);
      }

      let allPaths = [];
      let strokeCounter = 0;

      for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
        const lineData = lines[lineIdx];
        const totalLineWidth = lineData.length * charWidth + (lineData.length - 1) * charSpacing;
        const xOffset = padding + (maxWidth - totalLineWidth) / 2;
        const yOffset = yBase + (lineIdx * lineHeight);

        for (let charIdx = 0; charIdx < lineData.length; charIdx++) {
          const charData = lineData[charIdx];
          const ch = charData.char;

          // Get SVG path data from @tscircuit/alphabet
          // Try svgAlphabet first, then fallback to lineAlphabet
          let svgPath = svgAlphabet[ch];
          let points = null;

          if (!svgPath) {
            // If no SVG path, try lineAlphabet
            const lineSegments = lineAlphabet[ch];
            if (lineSegments && lineSegments.length > 0) {
              // Convert line segments to SVG path
              const pathParts = [];
              for (const segment of lineSegments) {
                if (Array.isArray(segment)) {
                  // Segment is array of [x,y] points
                  const pts = segment.map((p) => {
                    if (Array.isArray(p)) return { x: p[0], y: p[1] };
                    return p;
                  });
                  if (pts.length > 1) {
                    pathParts.push('M' + pts[0].x + ',' + pts[0].y);
                    for (let i = 1; i < pts.length; i++) {
                      pathParts.push('L' + pts[i].x + ',' + pts[i].y);
                    }
                  }
                }
              }
              svgPath = pathParts.join(' ');
            }
          }

          if (!svgPath) {
            // Fallback: use fillAlphabet
            const fillSegments = fillAlphabet[ch];
            if (fillSegments && fillSegments.length > 0) {
              const pathParts = [];
              for (const segment of fillSegments) {
                if (Array.isArray(segment)) {
                  const pts = segment.map((p) => {
                    if (Array.isArray(p)) return { x: p[0], y: p[1] };
                    return p;
                  });
                  if (pts.length > 1) {
                    pathParts.push('M' + pts[0].x + ',' + pts[0].y);
                    for (let i = 1; i < pts.length; i++) {
                      pathParts.push('L' + pts[i].x + ',' + pts[i].y);
                    }
                  }
                }
              }
              svgPath = pathParts.join(' ');
            }
          }

          if (!svgPath) {
            // Skip if no path found
            continue;
          }

          const charX = xOffset + charIdx * (charWidth + charSpacing);

          // Transform the SVG path with translation and scaling
          // First, scale the path (path coordinates are in 0-1 range, scale to 45px)
          const transformed = svgPath.replace(/([MLCQA])([^MLCQA]*)/g, (match, cmd, coords) => {
            const nums = coords.trim().split(/[\s,]+/).filter(n => n !== '').map(Number);
            const scaled = nums.map((n, i) => {
              const val = n * charWidth * scale + 10;
              if (i % 2 === 0) {
                return val + charX + 0;
              } else {
                return val + yOffset + 0;
              }
            });
            return cmd + scaled.join(' ');
          });

          allPaths.push({
            d: transformed,
            strokeNum: ++strokeCounter
          });
        }
      }

      const finalHeight = Math.max(400, lines.length * lineHeight + 100 + padding);

      // Build SVG
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" class="kanjiVG" width="${svgWidth}" height="${finalHeight}" viewBox="0 0 ${svgWidth} ${finalHeight}">`;
      svg += `<rect width="100%" height="100%" fill="white" rx="8" />`;
      svg += `<g style="fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke:#1e293b;">`;
      allPaths.forEach(p => {
        svg += `<path d="${p.d}" data-stroke="${p.strokeNum}" />`;
      });
      svg += `</g>`;
      svg += `</svg>`;

      return svg;
    }

    // ----- Render using KanjiVgAnimate library -----
    let currentAnimator = null;

    function renderAndAnimate(text) {
      // Clear previous
      container.innerHTML = '';
      if (currentAnimator) {
        currentAnimator = null;
      }

      const svgString = generateSVG(text);
      if (!svgString) {
        container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">No strokes</div>';
        statusLabel.textContent = '⏺ No strokes';
        return;
      }

      container.innerHTML = svgString;
      const svgElement = container.querySelector('svg');
      if (!svgElement) {
        statusLabel.textContent = '❌ Error';
        return;
      }

      svgElement.style.width = '100%';
      svgElement.style.height = 'auto';
      svgElement.style.display = 'block';
      svgElement.style.background = 'white';
      svgElement.style.borderRadius = '8px';

      // Initialize KanjiVgAnimate
      try {
        currentAnimator = new KanjivgAnimate('.kanjiVG', 500);
        statusLabel.textContent = '▶ Animating...';

        let checkCount = 0;
        const checkInterval = setInterval(() => {
          checkCount++;
          const paths = svgElement.querySelectorAll('path');
          let completed = 0;
          let total = 0;
          paths.forEach(p => {
            const offset = p.style.strokeDashoffset;
            if (offset !== undefined && offset !== null) {
              total++;
              if (parseFloat(offset) <= 1) {
                completed++;
              }
            }
          });

          if (total > 0 && completed === total) {
            statusLabel.textContent = `✅ Complete · ${total} strokes`;
            clearInterval(checkInterval);
          } else if (checkCount > 300) {
            statusLabel.textContent = `✅ Complete (${completed}/${total})`;
            clearInterval(checkInterval);
          } else if (checkCount % 10 === 0 && total > 0) {
            const progress = Math.round((completed / total) * 100);
            statusLabel.textContent = `⏳ ${progress}% · ${completed}/${total}`;
          }
        }, 100);
      } catch (e) {
        console.warn('KanjiVgAnimate error:', e);
        statusLabel.textContent = '⚠️ Error';
      }
    }

    // ----- Public functions -----
    function startTrace() {
      const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      renderAndAnimate(text);
    }

    function clearTrace() {
      container.innerHTML = '';
      if (currentAnimator) {
        currentAnimator = null;
      }
      statusLabel.textContent = '⏺ Cleared';
      container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">Enter text and click Trace</div>';
    }

    function resetTrace() {
      startTrace();
    }

    // ----- UI -----
    document.getElementById('traceBtn').addEventListener('click', startTrace);
    document.getElementById('clearBtn').addEventListener('click', clearTrace);
    document.getElementById('resetBtn').addEventListener('click', resetTrace);

    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        startTrace();
      }
    });

    // ----- Handle resize -----
    let resizeTimeout;
    function handleResize() {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        renderAndAnimate(text);
      }, 300);
    }

    window.addEventListener('resize', handleResize);

    // ----- Initial load -----
    window.addEventListener('load', () => {
      inputField.value = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      setTimeout(startTrace, 100);
    });
  </script>
</body>
</html>
