        <span class="legend-item"><span class="dot dot-start"></span> Start</span>

  <script>
    (function() {
      // ============================================================
      // KANJI-ANIMATE CORE LOGIC (adapted from the GitHub repo)
      // ============================================================
      
      const canvas = document.getElementById('tracerCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;

      // ----- State (matches Kanji-Animate's animation state) -----
      let currentStrokes = [];
      let animating = false;
      let animationId = null;
      let currentStroke = 0;
      let currentPoint = 0;
      const ANIMATION_SPEED = 2; // points per frame

      // ----- SVG Path parser (from Kanji-Animate) -----
      function parseSVGPath(d) {
        const points = [];
        const commands = d.match(/[a-zA-Z][^a-zA-Z]*/g);
        if (!commands) return points;

        let currentX = 0, currentY = 0;
        
        commands.forEach(cmd => {
          const type = cmd[0];
          const nums = cmd.slice(1).trim().split(/[\s,]+/).filter(n => n !== '').map(Number);
          
          if (type === 'M' || type === 'm') {
            const x = nums[0] || 0;
            const y = nums[1] || 0;
            currentX = type === 'm' ? currentX + x : x;
            currentY = type === 'm' ? currentY + y : y;
            points.push({ x: currentX, y: currentY });
          } else if (type === 'L' || type === 'l') {
            for (let i = 0; i < nums.length; i += 2) {
              const x = nums[i];
              const y = nums[i+1];
              currentX = type === 'l' ? currentX + x : x;
              currentY = type === 'l' ? currentY + y : y;
              points.push({ x: currentX, y: currentY });
            }
          } else if (type === 'C' || type === 'c') {
            // Cubic bezier - approximate with line segments
            for (let i = 0; i < nums.length; i += 6) {
              const cp1x = nums[i], cp1y = nums[i+1];
              const cp2x = nums[i+2], cp2y = nums[i+3];
              const x = nums[i+4], y = nums[i+5];
              const endX = type === 'c' ? currentX + x : x;
              const endY = type === 'c' ? currentY + y : y;
              
              // Simple approximation: 10 segments per bezier
              for (let t = 0.1; t <= 1; t += 0.1) {
                const mt = 1 - t;
                const px = Math.pow(mt, 3) * currentX + 
                          3 * Math.pow(mt, 2) * t * (type === 'c' ? currentX + cp1x : cp1x) +
                          3 * mt * Math.pow(t, 2) * (type === 'c' ? currentX + cp2x : cp2x) +
                          Math.pow(t, 3) * endX;
                const py = Math.pow(mt, 3) * currentY +
                          3 * Math.pow(mt, 2) * t * (type === 'c' ? currentY + cp1y : cp1y) +
                          3 * mt * Math.pow(t, 2) * (type === 'c' ? currentY + cp2y : cp2y) +
                          Math.pow(t, 3) * endY;
                points.push({ x: px, y: py });
              }
              currentX = endX;
              currentY = endY;
            }
          } else if (type === 'Q' || type === 'q') {
            // Quadratic bezier
            for (let i = 0; i < nums.length; i += 4) {
              const cpx = nums[i], cpy = nums[i+1];
              const x = nums[i+2], y = nums[i+3];
              const endX = type === 'q' ? currentX + x : x;
              const endY = type === 'q' ? currentY + y : y;
              
              for (let t = 0.1; t <= 1; t += 0.1) {
                const mt = 1 - t;
                const px = Math.pow(mt, 2) * currentX +
                          2 * mt * t * (type === 'q' ? currentX + cpx : cpx) +
                          Math.pow(t, 2) * endX;
                const py = Math.pow(mt, 2) * currentY +
                          2 * mt * t * (type === 'q' ? currentY + cpy : cpy) +
                          Math.pow(t, 2) * endY;
                points.push({ x: px, y: py });
              }
              currentX = endX;
              currentY = endY;
            }
          } else if (type === 'Z' || type === 'z') {
            // Close path - no action needed
          }
        });
        
        return points;
      }

        ],

        ],

        ],

          'M40,40 L40,50'
        ],
        '9': [
          'M20,65 L60,65 L65,35 L40,30 L20,35 L30,60 L55,55'
        ],
        ' ': []
      };

      // ----- Generate strokes from text (using Kanji-Animate's approach) -----
      function generateStrokes(text) {
        if (!text) return [];
        const result = [];
        const words = text.split(' ');
        let xOffset = 30;
        const yBase = 55;
        const charWidth = 45;
        const gap = 20;
        const maxWidth = W - 40;

        // Calculate scaling
        let totalWidth = 0;
        for (let w of words) {
          totalWidth += w.length * charWidth + (w.length - 1) * 6;
        }
        totalWidth += (words.length - 1) * gap;
        let scaleFactor = 1;
        if (totalWidth > maxWidth) scaleFactor = maxWidth / totalWidth;

        let strokeCounter = 0;

        for (let wIdx = 0; wIdx < words.length; wIdx++) {
          const word = words[wIdx];
          for (let chIdx = 0; chIdx < word.length; chIdx++) {
            const ch = word[chIdx];
            const paths = letterSVG[ch] || letterSVG['A'];
            
            for (let sIdx = 0; sIdx < paths.length; sIdx++) {
              const pathData = paths[sIdx];
              // Parse SVG path to points
              let points = parseSVGPath(pathData);
              
              // Scale and position
              const scaled = points.map((p) => ({
                x: p.x * scaleFactor * 0.8 + xOffset + 20,
                y: p.y * scaleFactor * 0.8 + yBase + 20
              }));
              
              if (scaled.length > 0) {
                result.push({
                  points: scaled,
                  strokeNum: ++strokeCounter
                });
              }
            }
            xOffset += charWidth * scaleFactor * 0.8 + 8;
          }
          if (wIdx < words.length - 1) xOffset += gap * scaleFactor;
        }
        return result;
      }

      // ----- Drawing (adapted from Kanji-Animate's render) -----
      function drawStroke(stroke, progress = 1, showNumber = true) {
        if (!stroke || stroke.points.length < 2) return;
        const pts = stroke.points;
        const total = pts.length;
        const drawCount = Math.max(1, Math.floor(progress * total));

        // Main stroke
        ctx.save();
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 4.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < drawCount && i < total; i++) {
          ctx.lineTo(pts[i].x, pts[i].y);
        }
        ctx.stroke();
        ctx.restore();

        // Start marker
        if (progress > 0.01) {
          ctx.save();
          ctx.fillStyle = '#22c55e';
          ctx.shadowColor = 'rgba(34,197,94,0.3)';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(pts[0].x, pts[0].y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // End marker
        if (progress >= 0.99) {
          ctx.save();
          ctx.fillStyle = '#ef4444';
          ctx.shadowColor = 'rgba(239,68,68,0.3)';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(pts[pts.length-1].x, pts[pts.length-1].y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // Stroke number
        if (showNumber && progress >= 0.3) {
          const midIdx = Math.floor(total / 2);
          const mid = pts[midIdx] || pts[0];
          ctx.save();
          const num = stroke.strokeNum || 0;
          const text = num.toString();
          ctx.font = 'bold 14px Inter, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const metrics = ctx.measureText(text);
          const pad = 6;
          const rectW = metrics.width + pad * 2;
          const rectH = 24;
          const x = mid.x - rectW/2;
          const y = mid.y - rectH/2 - 2;
          ctx.shadowColor = 'rgba(0,0,0,0.15)';
          ctx.shadowBlur = 8;
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath();
          ctx.roundRect(x, y, rectW, rectH, 12);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#0f172a';
          ctx.font = 'bold 13px Inter, sans-serif';
          ctx.fillText(text, mid.x, mid.y + 1);
          ctx.restore();
        }

        // Direction arrow
        if (progress >= 0.6 && drawCount >= 3) {
          const idx = Math.min(Math.floor(total * 0.6), total - 1);
          const p1 = pts[Math.max(0, idx - 1)];
          const p2 = pts[idx];
          const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
          const size = 9;
          ctx.save();
          ctx.fillStyle = '#1e293b';
          ctx.shadowColor = 'rgba(0,0,0,0.1)';
          ctx.shadowBlur = 4;
          ctx.translate(p2.x, p2.y);
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(-size, -size/2);
          ctx.lineTo(-size, size/2);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      // ----- Main draw (Kanji-Animate style) -----
      function drawAll(progress = 1) {
        ctx.clearRect(0, 0, W, H);

        // Grid
        ctx.save();
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < W; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, H);
          ctx.stroke();
        }
        for (let i = 0; i < H; i += 40) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(W, i);
          ctx.stroke();
        }
        ctx.restore();

        if (!currentStrokes.length) return;

        const total = currentStrokes.length;
        const complete = Math.floor(progress * total);

        for (let i = 0; i < total; i++) {
          const stroke = currentStrokes[i];
          if (i < complete) {
            drawStroke(stroke, 1, true);
          } else if (i === complete) {
            const partial = (progress * total) - i;
            drawStroke(stroke, partial, false);
          } else {
            // Ghost preview
            ctx.save();
            ctx.globalAlpha = 0.06;
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 3;
            ctx.setLineDash([3, 5]);
            ctx.beginPath();
            const pts = stroke.points;
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let j = 1; j < pts.length; j++) {
              ctx.lineTo(pts[j].x, pts[j].y);
            }
            ctx.stroke();
            ctx.restore();
          }
        }
      }

      // ----- Animation loop (Kanji-Animate style) -----
      function animate() {
        if (!animating) return;
        currentPoint += ANIMATION_SPEED;
        const progress = Math.min(currentPoint / currentStrokes.length, 1);
        drawAll(progress);

        if (progress < 1) {
          const done = Math.floor(progress * currentStrokes.length);
          document.getElementById('statusLabel').textContent = `⏳ ${Math.round(progress * 100)}% · ${done}/${currentStrokes.length}`;
          animationId = requestAnimationFrame(animate);
        } else {
          animating = false;
          document.getElementById('statusLabel').textContent = '✅ Complete · all strokes traced';
          animationId = null;
        }
      }

      // ----- Public functions -----
      function startTrace(text) {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        animating = false;
        const rawText = text || document.getElementById('wordInput').value || 'ABC';
        currentStrokes = generateStrokes(rawText);
        if (!currentStrokes.length) {
          ctx.clearRect(0, 0, W, H);
          document.getElementById('statusLabel').textContent = '⏺ No strokes';
          return;
        }
        currentPoint = 0;
        animating = true;
        document.getElementById('statusLabel').textContent = '▶ Animating...';
        animate();
      }

      function clearTrace() {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        animating = false;
        currentStrokes = [];
        currentPoint = 0;
        ctx.clearRect(0, 0, W, H);
        document.getElementById('statusLabel').textContent = '⏺ Cleared';
      }

      function resetTrace() {
        if (currentStrokes.length) {
          currentPoint = 0;
          animating = true;
          document.getElementById('statusLabel').textContent = '▶ Replaying...';
          animate();
        }
      }

      // ----- UI -----
      document.getElementById('traceBtn').addEventListener('click', () => startTrace(document.getElementById('wordInput').value));
      document.getElementById('clearBtn').addEventListener('click', clearTrace);
      document.getElementById('resetBtn').addEventListener('click', resetTrace);
      document.getElementById('wordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); startTrace(e.target.value); }
      });

      // roundRect polyfill
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          if (w < 2 * r) r = w / 2;
          if (h < 2 * r) r = h / 2;
          this.moveTo(x + r, y);
          this.lineTo(x + w - r, y);
          this.quadraticCurveTo(x + w, y, x + w, y + r);
          this.lineTo(x + w, y + h - r);
          this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          this.lineTo(x + r, y + h);
          this.quadraticCurveTo(x, y + h, x, y + h - r);
          this.lineTo(x, y + r);
          this.quadraticCurveTo(x, y, x + r, y);
          return this;
        };
      }

      // Initial load
      window.addEventListener('load', () => {
        document.getElementById('wordInput').value = 'ABC';
        startTrace('ABC');
      });
    })();
  </script>
</body>
</html>
