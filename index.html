        '9': ['M20,65 C40,65 60,65 65,55 C70,45 65,30 50,25 C35,20 20,25 15,35 C10,45 15,55 30,60', 'M50,25 C55,15 60,10 65,10'],

      // ----- Generate SVG -----
      function generateSVG(text) {
        if (!text) return null;
        
        const containerWidth = container.clientWidth || 780;
        const svgWidth = Math.min(containerWidth, 780);
        const padding = 30;
        const maxWidth = svgWidth - (padding * 2);
        const lineHeight = 90;
        const yBase = 55;
        const charWidth = 50;
        const charSpacing = 14;

        const chars = [];
        for (let ch of text) {
          chars.push({ char: ch });
        }

        const lines = [];
        let currentLine = [];
        let currentWidth = 0;

        for (let i = 0; i < chars.length; i++) {
          const charData = chars[i];
          const spacing = currentLine.length > 0 ? charSpacing : 0;
          const testWidth = currentWidth + charWidth + spacing;
          
          if (testWidth <= maxWidth) {
            currentLine.push(charData);
            currentWidth = testWidth;
          } else {
            if (currentLine.length > 0) {
              lines.push(currentLine);
            }
            currentLine = [charData];
            currentWidth = charWidth;
          }
        }
        if (currentLine.length > 0) {
          lines.push(currentLine);
        }

        let allPaths = [];
        let strokeCounter = 0;

        for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
          const lineData = lines[lineIdx];
          const totalLineWidth = lineData.length * charWidth + (lineData.length - 1) * charSpacing;
          const xOffset = padding + (maxWidth - totalLineWidth) / 2;
          const yOffset = yBase + (lineIdx * lineHeight);
          
          for (let charIdx = 0; charIdx < lineData.length; charIdx++) {
            const charData = lineData[charIdx];
            const ch = charData.char;
            const strokes = letterStrokes[ch] || letterStrokes['A'];
            
            const charX = xOffset + charIdx * (charWidth + charSpacing);
            
            for (let sIdx = 0; sIdx < strokes.length; sIdx++) {
              const pathData = strokes[sIdx];
              
              const transformed = pathData.replace(/([MLCQA])([^MLCQA]*)/g, (match, cmd, coords) => {
                const nums = coords.trim().split(/[\s,]+/).filter(n => n !== '').map(Number);
                const scaled = nums.map((n, i) => {
                  const val = n * 0.9;
                  if (i % 2 === 0) {
                    return val + charX + 15;
                  } else {
                    return val + yOffset + 20;
                  }
                });
                return cmd + scaled.join(' ');
              });
              
              allPaths.push({
                d: transformed,
                strokeNum: ++strokeCounter
              });
            }
          }
        }

        const finalHeight = Math.max(400, lines.length * lineHeight + 100 + padding);

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" class="kanjiVG" width="${svgWidth}" height="${finalHeight}" viewBox="0 0 ${svgWidth} ${finalHeight}">`;
        svg += `<rect width="100%" height="100%" fill="white" rx="8" />`;
        svg += `<g style="fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke:#1e293b;">`;
        allPaths.forEach(p => {
          svg += `<path d="${p.d}" data-stroke="${p.strokeNum}" />`;
        });
        svg += `</g>`;
        svg += `</svg>`;

        return svg;
      }

      // ----- KanjiVgAnimate library implementation -----
      function KanjivgAnimate(selector, time) {
        var elements = document.querySelectorAll(selector);
        var duration = time || 500;
        
        for (var i = 0; i < elements.length; i++) {
          var svg = elements[i];
          var paths = svg.querySelectorAll('path');
          var strokeData = [];
          
          for (var j = 0; j < paths.length; j++) {
            var path = paths[j];
            var stroke = parseInt(path.getAttribute('data-stroke')) || (j + 1);
            strokeData.push({ path: path, stroke: stroke, length: 0 });
          }
          
          strokeData.sort(function(a, b) {
            return a.stroke - b.stroke;
          });
          
          for (var k = 0; k < strokeData.length; k++) {
            var data = strokeData[k];
            try {
              var length = data.path.getTotalLength ? data.path.getTotalLength() : 100;
              data.length = length;
              data.path.style.strokeDasharray = length;
              data.path.style.strokeDashoffset = length;
            } catch(e) {
              data.length = 100;
              data.path.style.strokeDasharray = 100;
              data.path.style.strokeDashoffset = 100;
            }
          }
          
          // Dotted lines for future strokes
          var dottedG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          dottedG.setAttribute('style', 'fill:none;stroke-width:2;stroke-dasharray:4,6;stroke:#cbd5e1;stroke-linecap:round;stroke-linejoin:round;');
          for (var m = 0; m < strokeData.length; m++) {
            var dPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            dPath.setAttribute('d', strokeData[m].path.getAttribute('d'));
            dPath.setAttribute('data-stroke', strokeData[m].stroke);
            dottedG.appendChild(dPath);
          }
          svg.querySelector('g').parentNode.insertBefore(dottedG, svg.querySelector('g'));
          
          // Stroke numbers
          var textG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          textG.setAttribute('style', 'font-size:12px;font-weight:bold;font-family:Inter, sans-serif;fill:#1e293b;');
          for (var n = 0; n < strokeData.length; n++) {
            var data = strokeData[n];
            try {
              var length = data.length;
              if (length > 0) {
                var point = data.path.getPointAtLength ? data.path.getPointAtLength(length / 2) : null;
                if (point) {
                  var bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                  var num = (n + 1).toString();
                  var textWidth = num.length * 8 + 12;
                  bg.setAttribute('x', point.x - textWidth/2);
                  bg.setAttribute('y', point.y - 12);
                  bg.setAttribute('width', textWidth);
                  bg.setAttribute('height', '20');
                  bg.setAttribute('rx', '10');
                  bg.setAttribute('fill', 'rgba(255,255,255,0.9)');
                  bg.setAttribute('stroke', '#d1d5db');
                  bg.setAttribute('stroke-width', '1');
                  textG.appendChild(bg);
                  
                  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                  text.setAttribute('x', point.x);
                  text.setAttribute('y', point.y + 4);
                  text.setAttribute('text-anchor', 'middle');
                  text.textContent = num;
                  textG.appendChild(text);
                }
              }
            } catch(e) {}
          }
          svg.querySelector('g').parentNode.appendChild(textG);
          
          // Animate strokes
          for (var s = 0; s < strokeData.length; s++) {
            var data = strokeData[s];
            var delay = s * duration;
            data.path.style.transition = 'stroke-dashoffset ' + duration + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94) ' + delay + 'ms';
            setTimeout(function(path) {
              path.style.strokeDashoffset = 0;
            }, delay + 50, data.path);
          }
        }
      }

      // ----- Render -----
      let currentAnimator = null;

      function renderAndAnimate(text) {
        container.innerHTML = '';
        if (currentAnimator) {
          currentAnimator = null;
        }

        const svgString = generateSVG(text);
        if (!svgString) {
          container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">No strokes</div>';
          statusLabel.textContent = '⏺ No strokes';
          return;
        }

        container.innerHTML = svgString;
        const svgElement = container.querySelector('svg');
        if (!svgElement) {
          statusLabel.textContent = '❌ Error';
          return;
        }

        svgElement.style.width = '100%';
        svgElement.style.height = 'auto';
        svgElement.style.display = 'block';
        svgElement.style.background = 'white';
        svgElement.style.borderRadius = '8px';

        try {
          currentAnimator = new KanjivgAnimate('.kanjiVG', 500);
          statusLabel.textContent = '▶ Animating...';
          
          let checkCount = 0;
          const checkInterval = setInterval(() => {
            checkCount++;
            const paths = svgElement.querySelectorAll('path');
            let completed = 0;
            let total = 0;
            paths.forEach(p => {
              const offset = p.style.strokeDashoffset;
              if (offset !== undefined && offset !== null) {
                total++;
                if (parseFloat(offset) <= 1) {
                  completed++;
                }
              }
            });
            
            if (total > 0 && completed === total) {
              statusLabel.textContent = `✅ Complete · ${total} strokes`;
              clearInterval(checkInterval);
            } else if (checkCount > 300) {
              statusLabel.textContent = `✅ Complete (${completed}/${total})`;
              clearInterval(checkInterval);
            } else if (checkCount % 10 === 0 && total > 0) {
              const progress = Math.round((completed / total) * 100);
              statusLabel.textContent = `⏳ ${progress}% · ${completed}/${total}`;
            }
          }, 100);
          
        } catch (e) {
          console.warn('Error:', e);
          statusLabel.textContent = '⚠️ Error';
        }
      }

      // ----- Public functions -----
      function startTrace() {
        const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        renderAndAnimate(text);
      }

      function clearTrace() {
        container.innerHTML = '';
        if (currentAnimator) {
          currentAnimator = null;
        }
        statusLabel.textContent = '⏺ Cleared';
        container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">Enter text and click Trace</div>';
      }

      function resetTrace() {
        startTrace();
      }

      // ----- UI -----
      document.getElementById('traceBtn').addEventListener('click', startTrace);
      document.getElementById('clearBtn').addEventListener('click', clearTrace);
      document.getElementById('resetBtn').addEventListener('click', resetTrace);
      
      inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          startTrace();
        }
      });

      let resizeTimeout;
      function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          renderAndAnimate(text);
        }, 300);
      }

      window.addEventListener('resize', handleResize);

      window.addEventListener('load', () => {
        inputField.value = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        setTimeout(startTrace, 100);
      });

    })();
  </script>
</body>
</html>
