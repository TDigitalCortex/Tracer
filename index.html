<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tracer · Product Sans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f1f5f9;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      padding: 2rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      padding-left: 1rem;
      border-left: 3px solid #94a3b8;
    }
    .display-area {
      background: #f8fafc;
      border-radius: 20px;
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
      min-height: 400px;
      position: relative;
      overflow: auto;
      max-height: 600px;
    }
    #svgContainer {
      width: 100%;
      min-height: 400px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #ffffff;
      border-radius: 16px;
      overflow: visible;
      position: relative;
      padding: 10px 0;
    }
    #svgContainer svg {
      width: 100%;
      height: auto;
      display: block;
      background: white;
      max-width: 100%;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .input-group {
      flex: 2 1 300px;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-group label {
      font-weight: 500;
      color: #1e293b;
      font-size: 0.95rem;
    }
    .input-group input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
      min-width: 120px;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-primary {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
    }
    .btn-primary:hover { background: #0f172a; border-color: #0f172a; }
    .btn-secondary {
      background: #f1f5f9;
      border-color: #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: #64748b;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .status-badge {
      background: #f1f5f9;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-weight: 450;
    }
    .legend {
      display: flex;
      gap: 1rem;
      align-items: center;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-start { background: #22c55e; }
    .dot-end { background: #ef4444; }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .input-group { flex-wrap: wrap; }
    }
  </style>
</head>

      <div id="svgContainer"></div>
    </div>

      <div class="input-group">

        <input type="text" id="wordInput" placeholder="e.g. ABC, hello" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="traceBtn">▶ Trace</button>
        <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-badge" id="statusLabel">⏺ Ready</span>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-start"></span> Start</span>
        <span class="legend-item"><span class="dot dot-end"></span> End</span>
        <span class="legend-item">🔢 Stroke order</span>
      </div>
    </div>
  </div>

      // ----- Generate SVG with Product Sans paths -----
      function generateSVG(text) {
        if (!text) return null;
        
        const containerWidth = container.clientWidth || 780;
        const svgWidth = Math.min(containerWidth, 780);
        const padding = 30;
        const maxWidth = svgWidth - (padding * 2);
        const lineHeight = 90;
        const yBase = 55;
        const charWidth = 50;
        const charSpacing = 14;
        const scaleFactor = 0.9;

        const chars = [];
        for (let ch of text) {
          chars.push({ char: ch });
        }

        const lines = [];
        let currentLine = [];
        let currentWidth = 0;

        for (let i = 0; i < chars.length; i++) {
          const charData = chars[i];
          const spacing = currentLine.length > 0 ? charSpacing : 0;
          const testWidth = currentWidth + charWidth + spacing;
          
          if (testWidth <= maxWidth) {
            currentLine.push(charData);
            currentWidth = testWidth;
          } else {
            if (currentLine.length > 0) {
              lines.push(currentLine);
            }
            currentLine = [charData];
            currentWidth = charWidth;
          }
        }
        if (currentLine.length > 0) {
          lines.push(currentLine);
        }

        let allPaths = [];
        let strokeCounter = 0;

        for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
          const lineData = lines[lineIdx];
          const totalLineWidth = lineData.length * charWidth + (lineData.length - 1) * charSpacing;
          const xOffset = padding + (maxWidth - totalLineWidth) / 2;
          const yOffset = yBase + (lineIdx * lineHeight);
          
          for (let charIdx = 0; charIdx < lineData.length; charIdx++) {
            const charData = lineData[charIdx];
            const ch = charData.char.toUpperCase();
            const pathData = productSansPaths[ch];
            
            if (!pathData) continue;
            
            const charX = xOffset + charIdx * (charWidth + charSpacing);
            
            // Transform the path with scaling and positioning
            const transformed = pathData.replace(/([MLCQA])([^MLCQA]*)/g, (match, cmd, coords) => {
              const nums = coords.trim().split(/[\s,]+/).filter(n => n !== '').map(Number);
              const scaled = nums.map((n, i) => {
                const val = n * scaleFactor;
                if (i % 2 === 0) {
                  return val + charX + 15;
                } else {
                  return val + yOffset + 20;
                }
              });
              return cmd + scaled.join(' ');
            });
            
            allPaths.push({
              d: transformed,
              strokeNum: ++strokeCounter
            });
          }
        }

        const finalHeight = Math.max(400, lines.length * lineHeight + 100 + padding);

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" class="kanjiVG" width="${svgWidth}" height="${finalHeight}" viewBox="0 0 ${svgWidth} ${finalHeight}">`;
        svg += `<rect width="100%" height="100%" fill="white" rx="8" />`;
        svg += `<g style="fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke:#1e293b;">`;
        allPaths.forEach(p => {
          svg += `<path d="${p.d}" data-stroke="${p.strokeNum}" />`;
        });
        svg += `</g>`;
        svg += `</svg>`;

        return svg;
      }

      // ----- KanjiVgAnimate library implementation -----
      function KanjivgAnimate(selector, time) {
        var elements = document.querySelectorAll(selector);
        var duration = time || 500;
        
        for (var i = 0; i < elements.length; i++) {
          var svg = elements[i];
          var paths = svg.querySelectorAll('path');
          var strokeData = [];
          
          for (var j = 0; j < paths.length; j++) {
            var path = paths[j];
            var stroke = parseInt(path.getAttribute('data-stroke')) || (j + 1);
            strokeData.push({ path: path, stroke: stroke, length: 0 });
          }
          
          strokeData.sort(function(a, b) {
            return a.stroke - b.stroke;
          });
          
          for (var k = 0; k < strokeData.length; k++) {
            var data = strokeData[k];
            try {
              var length = data.path.getTotalLength ? data.path.getTotalLength() : 100;
              data.length = length;
              data.path.style.strokeDasharray = length;
              data.path.style.strokeDashoffset = length;
            } catch(e) {
              data.length = 100;
              data.path.style.strokeDasharray = 100;
              data.path.style.strokeDashoffset = 100;
            }
          }
          
          // Dotted lines for future strokes
          var dottedG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          dottedG.setAttribute('style', 'fill:none;stroke-width:2;stroke-dasharray:4,6;stroke:#cbd5e1;stroke-linecap:round;stroke-linejoin:round;');
          for (var m = 0; m < strokeData.length; m++) {
            var dPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            dPath.setAttribute('d', strokeData[m].path.getAttribute('d'));
            dPath.setAttribute('data-stroke', strokeData[m].stroke);
            dottedG.appendChild(dPath);
          }
          svg.querySelector('g').parentNode.insertBefore(dottedG, svg.querySelector('g'));
          
          // Stroke numbers - clean, no background
          var textG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          textG.setAttribute('style', 'font-size:9px;font-weight:bold;font-family:Inter, sans-serif;fill:#1e293b;');
          
          var usedPositions = [];
          var minDistance = 24;
          
          for (var n = 0; n < strokeData.length; n++) {
            var data = strokeData[n];
            try {
              var length = data.length;
              if (length > 0) {
                var point = data.path.getPointAtLength ? data.path.getPointAtLength(length * 0.3) : null;
                if (point) {
                  var prevPoint = data.path.getPointAtLength ? data.path.getPointAtLength(Math.max(0, length * 0.3 - 5)) : null;
                  var angle = 0;
                  if (prevPoint) {
                    angle = Math.atan2(point.y - prevPoint.y, point.x - prevPoint.x);
                  }
                  
                  var offsetX = 18 * Math.cos(angle + Math.PI/2);
                  var offsetY = 18 * Math.sin(angle + Math.PI/2);
                  
                  if (Math.abs(angle) < 0.2 || Math.abs(angle) > 3.0) {
                    offsetX = 22;
                    offsetY = -6;
                  } else if (Math.abs(angle) > 1.2 && Math.abs(angle) < 1.8) {
                    offsetX = 8;
                    offsetY = -22;
                  }
                  
                  var positions = [
                    { x: point.x + offsetX, y: point.y + offsetY },
                    { x: point.x + offsetX + 16, y: point.y + offsetY - 6 },
                    { x: point.x + offsetX - 16, y: point.y + offsetY + 6 },
                    { x: point.x + offsetX + 12, y: point.y + offsetY - 12 },
                    { x: point.x + offsetX - 12, y: point.y + offsetY + 12 }
                  ];
                  
                  var selectedPos = positions[0];
                  var minOverlap = Infinity;
                  
                  for (var p = 0; p < positions.length; p++) {
                    var pos = positions[p];
                    var overlap = 0;
                    for (var u = 0; u < usedPositions.length; u++) {
                      var used = usedPositions[u];
                      var dist = Math.sqrt(Math.pow(pos.x - used.x, 2) + Math.pow(pos.y - used.y, 2));
                      if (dist < minDistance) {
                        overlap += (minDistance - dist);
                      }
                    }
                    if (overlap < minOverlap) {
                      minOverlap = overlap;
                      selectedPos = pos;
                    }
                  }
                  
                  usedPositions.push({ x: selectedPos.x, y: selectedPos.y });
                  
                  var num = (n + 1).toString();
                  
                  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                  text.setAttribute('x', selectedPos.x);
                  text.setAttribute('y', selectedPos.y + 3);
                  text.setAttribute('text-anchor', 'middle');
                  text.setAttribute('fill', '#1e293b');
                  text.setAttribute('font-size', '9');
                  text.setAttribute('font-weight', 'bold');
                  text.setAttribute('font-family', 'Inter, sans-serif');
                  text.textContent = num;
                  textG.appendChild(text);
                }
              }
            } catch(e) {}
          }
          svg.querySelector('g').parentNode.appendChild(textG);
          
          // Animate strokes
          for (var s = 0; s < strokeData.length; s++) {
            var data = strokeData[s];
            var delay = s * duration;
            data.path.style.transition = 'stroke-dashoffset ' + duration + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94) ' + delay + 'ms';
            setTimeout(function(path) {
              path.style.strokeDashoffset = 0;
            }, delay + 50, data.path);
          }
        }
      }

      // ----- Render -----
      let currentAnimator = null;

      function renderAndAnimate(text) {
        container.innerHTML = '';
        if (currentAnimator) {
          currentAnimator = null;
        }

        const svgString = generateSVG(text);
        if (!svgString) {
          container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">No strokes</div>';
          statusLabel.textContent = '⏺ No strokes';
          return;
        }

        container.innerHTML = svgString;
        const svgElement = container.querySelector('svg');
        if (!svgElement) {
          statusLabel.textContent = '❌ Error';
          return;
        }

        svgElement.style.width = '100%';
        svgElement.style.height = 'auto';
        svgElement.style.display = 'block';
        svgElement.style.background = 'white';
        svgElement.style.borderRadius = '8px';

        try {
          currentAnimator = new KanjivgAnimate('.kanjiVG', 500);
          statusLabel.textContent = '▶ Animating...';
          
          let checkCount = 0;
          const checkInterval = setInterval(() => {
            checkCount++;
            const paths = svgElement.querySelectorAll('path');
            let completed = 0;
            let total = 0;
            paths.forEach(p => {
              const offset = p.style.strokeDashoffset;
              if (offset !== undefined && offset !== null) {
                total++;
                if (parseFloat(offset) <= 1) {
                  completed++;
                }
              }
            });
            
            if (total > 0 && completed === total) {
              statusLabel.textContent = `✅ Complete · ${total} strokes`;
              clearInterval(checkInterval);
            } else if (checkCount > 300) {
              statusLabel.textContent = `✅ Complete (${completed}/${total})`;
              clearInterval(checkInterval);
            } else if (checkCount % 10 === 0 && total > 0) {
              const progress = Math.round((completed / total) * 100);
              statusLabel.textContent = `⏳ ${progress}% · ${completed}/${total}`;
            }
          }, 100);
          
        } catch (e) {
          console.warn('Error:', e);
          statusLabel.textContent = '⚠️ Error';
        }
      }

      // ----- Public functions -----
      function startTrace() {
        const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        renderAndAnimate(text);
      }

      function clearTrace() {
        container.innerHTML = '';
        if (currentAnimator) {
          currentAnimator = null;
        }
        statusLabel.textContent = '⏺ Cleared';
        container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">Enter text and click Trace</div>';
      }

      function resetTrace() {
        startTrace();
      }

      // ----- UI -----
      document.getElementById('traceBtn').addEventListener('click', startTrace);
      document.getElementById('clearBtn').addEventListener('click', clearTrace);
      document.getElementById('resetBtn').addEventListener('click', resetTrace);
      
      inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          startTrace();
        }
      });

      let resizeTimeout;
      function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          renderAndAnimate(text);
        }, 300);
      }

      window.addEventListener('resize', handleResize);

      window.addEventListener('load', () => {
        inputField.value = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        setTimeout(startTrace, 100);
      });

    })();
  </script>
