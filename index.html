<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tracer · Kanji-Animate Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      padding: 2rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      padding-left: 1rem;
      border-left: 3px solid #94a3b8;
    }
    .display-area {
      background: #f8fafc;
      border-radius: 20px;
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
      min-height: 400px;
      position: relative;
      overflow: auto;
      max-height: 600px;
    }
    #svgContainer {
      width: 100%;
      min-height: 400px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #ffffff;
      border-radius: 16px;
      overflow: visible;
      position: relative;
      padding: 10px 0;
    }
    #svgContainer svg {
      width: 100%;
      height: auto;
      display: block;
      background: white;
      max-width: 100%;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .input-group {
      flex: 2 1 300px;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-group label {
      font-weight: 500;
      color: #1e293b;
      font-size: 0.95rem;
    }
    .input-group input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
      min-width: 120px;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-primary {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
    }
    .btn-primary:hover { background: #0f172a; border-color: #0f172a; }
    .btn-secondary {
      background: #f1f5f9;
      border-color: #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: #64748b;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .status-badge {
      background: #f1f5f9;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-weight: 450;
    }
    .legend {
      display: flex;
      gap: 1rem;
      align-items: center;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-start { background: #22c55e; }
    .dot-end { background: #ef4444; }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .input-group { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ Letter Tracer</h1>
    <div class="subhead">Kanji-Animate style · Proper stroke order</div>
    <div class="display-area">
      <div id="svgContainer"></div>
    </div>
    <div class="controls">
      <div class="input-group">
        <label for="wordInput">Text</label>
        <input type="text" id="wordInput" placeholder="e.g. ABC, hello" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="traceBtn">▶ Trace</button>
        <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-badge" id="statusLabel">⏺ Ready</span>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-start"></span> Start</span>
        <span class="legend-item"><span class="dot dot-end"></span> End</span>
        <span class="legend-item">🔢 Stroke order</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const container = document.getElementById('svgContainer');
      const statusLabel = document.getElementById('statusLabel');
      const inputField = document.getElementById('wordInput');

      // ----- Letter stroke data (KanjiVG format) -----
      const letterStrokes = {
        'A': ['M25,85 L40,15 L55,85', 'M32,55 L48,55'],
        'B': ['M20,15 L20,85', 'M20,25 C35,25 50,25 55,35 C60,45 55,55 45,55 C55,55 60,65 55,75 C50,85 35,85 20,85'],
        'C': ['M65,25 C55,15 35,15 25,20 C15,25 10,45 15,65 C20,80 40,85 55,80 C65,75 70,60 70,50'],
        'D': ['M20,15 L20,85', 'M20,25 C40,25 60,25 65,45 C70,65 60,85 40,85 C25,85 20,85 20,85'],
        'E': ['M20,15 L60,15', 'M20,15 L20,85', 'M20,50 L50,50', 'M20,85 L60,85'],
        'F': ['M20,15 L60,15', 'M20,15 L20,85', 'M20,50 L50,50'],
        'G': ['M65,25 C55,15 35,15 25,20 C15,25 10,45 15,65 C20,80 40,85 55,80 C65,75 70,60 70,50', 'M70,50 L45,50'],
        'H': ['M20,15 L20,85', 'M55,15 L55,85', 'M20,50 L55,50'],
        'I': ['M15,15 L65,15', 'M40,15 L40,85', 'M15,85 L65,85'],
        'J': ['M65,15 L65,60 C65,75 55,85 40,85 C25,85 15,75 15,60'],
        'K': ['M20,15 L20,85', 'M20,50 C35,40 50,25 60,15', 'M20,50 C35,60 50,75 60,85'],
        'L': ['M20,15 L20,85', 'M20,85 L60,85'],
        'M': ['M15,15 L15,85', 'M15,15 L40,55', 'M40,55 L65,15', 'M65,15 L65,85'],
        'N': ['M20,15 L20,85', 'M20,15 C35,35 50,60 60,85', 'M60,15 L60,85'],
        'O': ['M40,15 C20,15 10,35 15,55 C20,75 40,85 60,80 C75,75 80,55 75,35 C70,20 50,15 40,15'],
        'P': ['M20,15 L20,85', 'M20,25 C40,25 60,25 65,45 C70,60 60,65 40,65 C25,65 20,65 20,65'],
        'Q': ['M40,15 C20,15 10,35 15,55 C20,75 40,85 60,80 C75,75 80,55 75,35 C70,20 50,15 40,15', 'M60,65 L75,80'],
        'R': ['M20,15 L20,85', 'M20,25 C40,25 60,25 65,45 C70,60 60,65 40,65 C25,65 20,65 20,65', 'M45,65 L65,85'],
        'S': ['M65,25 C55,15 35,15 25,20 C15,25 10,45 15,65 C20,80 40,85 55,80 C65,75 70,60 70,50'],
        'T': ['M10,15 L70,15', 'M40,15 L40,85'],
        'U': ['M20,15 L20,60 C20,75 30,85 45,85 C60,85 70,75 70,60 L70,15'],
        'V': ['M10,15 C25,50 35,75 40,85 C45,75 55,50 70,15'],
        'W': ['M10,15 L10,85', 'M10,85 L40,45', 'M40,45 L70,85', 'M70,85 L70,15'],
        'X': ['M20,15 C35,40 45,65 60,85', 'M60,15 C45,40 35,65 20,85'],
        'Y': ['M10,15 C25,40 35,55 40,60', 'M40,60 C45,55 55,40 70,15', 'M40,60 L40,85'],
        'Z': ['M10,15 L70,15', 'M70,15 C50,40 30,65 10,85', 'M10,85 L70,85'],
        'a': ['M55,25 C45,15 25,15 15,25 C5,40 10,60 25,70 C40,75 55,70 65,60', 'M65,25 L65,55', 'M65,55 C60,70 50,75 40,70'],
        'b': ['M20,15 L20,75', 'M20,30 C35,25 50,25 60,35 C70,50 60,65 40,65 C25,65 20,60 20,60'],
        'c': ['M60,30 C45,20 25,20 15,30 C5,45 10,65 25,75 C40,80 55,75 65,65'],
        'd': ['M60,15 L60,75', 'M60,30 C45,25 30,25 20,35 C10,50 20,65 40,65 C55,65 60,60 60,60'],
        'e': ['M60,25 C45,15 25,15 15,25 C5,40 10,55 25,60 C40,65 60,60 65,50', 'M20,40 L50,40'],
        'f': ['M30,15 L45,15', 'M40,15 L40,75', 'M20,30 C35,30 50,30 55,30'],
        'g': ['M55,25 C40,15 25,15 15,25 C5,40 10,60 25,70 C40,75 55,65 60,55', 'M60,45 C60,60 60,75 50,85 C35,90 20,85 15,70', 'M15,70 C10,60 10,55 15,50'],
        'h': ['M20,15 L20,75', 'M20,30 C35,25 50,25 60,35 C70,50 60,65 45,65'],
        'i': ['M30,15 L30,23', 'M30,33 C30,45 30,60 30,65', 'M30,33 C25,40 20,45 20,50'],
        'j': ['M45,15 L45,23', 'M45,33 C45,50 45,65 40,75 C35,85 20,85 15,75', 'M45,33 C40,40 35,45 35,50'],
        'k': ['M20,15 L20,75', 'M20,35 C30,30 40,20 50,15', 'M20,35 C30,40 40,50 50,65'],
        'l': ['M20,15 L20,75', 'M20,75 C25,80 30,80 30,80'],
        'm': ['M15,75 L15,25', 'M15,25 L35,45', 'M35,45 L55,25', 'M55,25 L55,75'],
        'n': ['M20,75 L20,25', 'M20,25 C35,25 45,25 55,35 C65,45 60,65 45,65'],
        'o': ['M35,20 C20,20 10,35 15,55 C20,70 35,75 50,70 C65,65 70,45 60,30 C50,20 40,20 35,20'],
        'p': ['M20,20 L20,85', 'M20,30 C35,25 50,25 60,35 C70,50 60,65 40,65 C25,65 20,60 20,60'],
        'q': ['M60,20 L60,85', 'M60,30 C45,25 30,25 20,35 C10,50 20,65 40,65 C55,65 60,60 60,60'],
        'r': ['M20,20 L20,65', 'M20,25 C30,20 45,20 60,30'],
        's': ['M60,30 C45,20 25,20 15,25 C5,35 15,45 25,50 C40,55 50,60 55,70 C60,80 45,85 25,80'],
        't': ['M20,15 C30,15 40,15 45,15', 'M30,15 L30,70', 'M30,35 C40,35 50,35 55,35'],
        'u': ['M20,20 L20,55 C20,65 25,75 40,75 C55,75 65,65 65,50', 'M65,20 L65,50'],
        'v': ['M15,20 C25,45 30,60 35,70 C40,60 45,45 55,20'],
        'w': ['M10,20 L10,75', 'M10,75 L30,45', 'M30,45 L50,75', 'M50,75 L50,20'],
        'x': ['M15,20 C30,40 40,60 55,70', 'M55,20 C40,40 30,60 15,70'],
        'y': ['M15,20 C25,40 35,55 40,60', 'M40,60 C45,55 55,40 65,20', 'M40,60 C40,70 40,80 35,85 C30,90 20,90 15,85'],
        'z': ['M15,20 L65,20', 'M65,20 C45,40 30,60 15,75', 'M15,75 L65,75'],
        '0': ['M40,15 C20,15 10,35 15,55 C20,75 40,85 60,80 C75,75 80,55 75,35 C70,20 50,15 40,15'],
        '1': ['M25,30 L40,15 L40,85'],
        '2': ['M15,25 C35,25 55,25 60,25 C40,40 25,55 15,70 C10,80 20,85 40,85 C55,85 65,80 70,75'],
        '3': ['M15,25 C40,25 60,25 65,35 C70,45 60,50 40,50 C60,50 65,55 70,65 C75,75 60,85 35,85 C15,85 10,80 10,75'],
        '4': ['M40,15 L40,60 C40,70 50,70 60,70', 'M20,40 C35,40 50,40 60,40', 'M40,60 L40,85'],
        '5': ['M50,20 C35,20 20,20 15,20 C15,35 15,45 15,50 C35,50 50,50 60,50 C65,65 60,80 40,85 C20,85 15,80 10,75'],
        '6': ['M60,20 C40,20 20,20 15,30 C10,45 15,60 30,65 C50,70 65,60 70,50 C75,40 65,30 50,30', 'M30,65 C25,75 20,80 25,85'],
        '7': ['M15,20 C35,20 55,20 70,20 C60,40 50,60 40,85'],
        '8': ['M40,20 C20,20 10,30 15,45 C20,55 35,60 45,60 C60,60 70,50 70,40 C70,25 55,20 40,20', 'M40,40 C25,40 15,50 20,65 C25,75 40,80 55,75 C70,70 75,55 65,45 C55,40 45,40 40,40'],
        '9': ['M20,65 C40,65 60,65 65,55 C70,45 65,30 50,25 C35,20 20,25 15,35 C10,45 15,55 30,60', 'M50,25 C55,15 60,10 65,10'],
        ' ': []
      };

      // ----- Generate SVG with correct line break logic -----
      function generateSVG(text) {
        if (!text) return null;
        
        // Get container width
        const containerWidth = container.clientWidth || 780;
        const svgWidth = Math.min(containerWidth, 780);
        const charWidth = 50;
        const scaleFactor = 1.0;
        const padding = 30;
        const maxWidth = svgWidth - (padding * 2);
        const lineHeight = 90;
        const yBase = 55;
        const charSpacing = 6;

        // Split into characters with widths
        const chars = [];
        for (let ch of text) {
          const width = charWidth * scaleFactor * 0.9;
          chars.push({ char: ch, width: width });
        }

        // Layout characters into lines
        const lines = [];
        let currentLine = [];
        let currentWidth = 0;

        for (let i = 0; i < chars.length; i++) {
          const charData = chars[i];
          const charWidth_ = charData.width;
          
          const testWidth = currentWidth + charWidth_ + (currentLine.length > 0 ? charSpacing : 0);
          
          if (testWidth <= maxWidth) {
            currentLine.push(charData);
            currentWidth = testWidth;
          } else {
            if (currentLine.length > 0) {
              lines.push(currentLine);
            }
            currentLine = [charData];
            currentWidth = charWidth_;
          }
        }
        if (currentLine.length > 0) {
          lines.push(currentLine);
        }

        // Generate paths
        let allPaths = [];
        let strokeCounter = 0;

        for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
          const lineData = lines[lineIdx];
          let xOffset = padding;
          const yOffset = yBase + (lineIdx * lineHeight);
          
          for (let charIdx = 0; charIdx < lineData.length; charIdx++) {
            const charData = lineData[charIdx];
            const ch = charData.char;
            const strokes = letterStrokes[ch] || letterStrokes['A'];
            
            for (let sIdx = 0; sIdx < strokes.length; sIdx++) {
              const pathData = strokes[sIdx];
              
              const transformed = pathData.replace(/([MLCQA])([^MLCQA]*)/g, (match, cmd, coords) => {
                const nums = coords.trim().split(/[\s,]+/).filter(n => n !== '').map(Number);
                const scaled = nums.map((n, i) => {
                  const val = n * scaleFactor * 0.9;
                  if (i % 2 === 0) {
                    return val + xOffset + 15;
                  } else {
                    return val + yOffset + 20;
                  }
                });
                return cmd + scaled.join(' ');
              });
              
              allPaths.push({
                d: transformed,
                strokeNum: ++strokeCounter
              });
            }
            xOffset += charData.width + charSpacing;
          }
        }

        // Calculate final height
        const finalHeight = Math.max(400, lines.length * lineHeight + 100 + padding);

        // Build SVG
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="${finalHeight}" viewBox="0 0 ${svgWidth} ${finalHeight}">`;
        svg += `<rect width="100%" height="100%" fill="white" rx="8" />`;
        svg += `<g style="fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke:#1e293b;">`;
        allPaths.forEach(p => {
          svg += `<path d="${p.d}" data-stroke="${p.strokeNum}" />`;
        });
        svg += `</g>`;
        svg += `</svg>`;

        return svg;
      }

      // ----- SVG stroke animation with fixed completion -----
      function animateStrokes(svgElement, duration = 500) {
        const paths = svgElement.querySelectorAll('path');
        if (!paths.length) {
          statusLabel.textContent = '⏺ No strokes';
          return null;
        }

        const totalStrokes = paths.length;
        let startTime = null;
        let animationId = null;
        let isComplete = false;

        // Set up each path
        paths.forEach((path) => {
          try {
            const length = path.getTotalLength ? path.getTotalLength() : 100;
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;
            path.dataset.length = length;
            path.style.opacity = '0.1';
          } catch(e) {
            path.style.strokeDasharray = 100;
            path.style.strokeDashoffset = 100;
            path.dataset.length = 100;
            path.style.opacity = '0.1';
          }
        });

        function animate(timestamp) {
          if (isComplete) return;
          
          if (!startTime) startTime = timestamp;
          const elapsed = timestamp - startTime;
          
          // Calculate which stroke we're on
          const totalTime = totalStrokes * duration;
          const progress = Math.min(elapsed / totalTime, 1);
          
          const strokeIndex = Math.min(Math.floor(progress * totalStrokes), totalStrokes - 1);
          const strokeProgress = Math.min((progress * totalStrokes) - strokeIndex, 1);
          
          // Update paths
          paths.forEach((path, index) => {
            const length = parseFloat(path.dataset.length) || 100;
            if (index < strokeIndex) {
              path.style.strokeDashoffset = 0;
              path.style.opacity = 1;
            } else if (index === strokeIndex) {
              const offset = length * (1 - strokeProgress);
              path.style.strokeDashoffset = offset;
              path.style.opacity = 1;
            } else {
              path.style.strokeDashoffset = length;
              path.style.opacity = 0.1;
            }
          });

          const percent = Math.round(progress * 100);
          const done = Math.min(strokeIndex + 1, totalStrokes);
          statusLabel.textContent = `⏳ ${Math.min(percent, 100)}% · ${done}/${totalStrokes}`;

          // Check completion - using progress >= 1 ensures it finishes
          if (progress >= 1) {
            isComplete = true;
            statusLabel.textContent = `✅ Complete · ${totalStrokes} strokes`;
            paths.forEach(path => {
              path.style.strokeDashoffset = 0;
              path.style.opacity = 1;
            });
            return;
          }

          animationId = requestAnimationFrame(animate);
        }

        animationId = requestAnimationFrame(animate);

        return () => {
          isComplete = true;
          if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
          }
        };
      }

      // ----- Render and animate -----
      let cancelAnimation = null;

      function renderAndAnimate(text) {
        if (cancelAnimation) {
          cancelAnimation();
          cancelAnimation = null;
        }
        container.innerHTML = '';

        const svgString = generateSVG(text);
        if (!svgString) {
          container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">No strokes</div>';
          statusLabel.textContent = '⏺ No strokes';
          return;
        }

        container.innerHTML = svgString;
        const svgElement = container.querySelector('svg');
        if (!svgElement) {
          statusLabel.textContent = '❌ Error';
          return;
        }

        svgElement.style.width = '100%';
        svgElement.style.height = 'auto';
        svgElement.style.display = 'block';
        svgElement.style.background = 'white';
        svgElement.style.borderRadius = '8px';

        statusLabel.textContent = '▶ Animating...';
        cancelAnimation = animateStrokes(svgElement, 500);
      }

      // ----- Public functions -----
      function startTrace() {
        const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        renderAndAnimate(text);
      }

      function clearTrace() {
        if (cancelAnimation) {
          cancelAnimation();
          cancelAnimation = null;
        }
        container.innerHTML = '';
        statusLabel.textContent = '⏺ Cleared';
        container.innerHTML = '<div style="color:#94a3b8;padding:2rem;text-align:center;">Enter text and click Trace</div>';
      }

      function resetTrace() {
        startTrace();
      }

      // ----- UI -----
      document.getElementById('traceBtn').addEventListener('click', startTrace);
      document.getElementById('clearBtn').addEventListener('click', clearTrace);
      document.getElementById('resetBtn').addEventListener('click', resetTrace);
      
      inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          startTrace();
        }
      });

      // ----- Handle resize -----
      let resizeTimeout;
      function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          const text = inputField.value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          renderAndAnimate(text);
        }, 300);
      }

      window.addEventListener('resize', handleResize);

      // ----- Initial load -----
      window.addEventListener('load', () => {
        inputField.value = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        setTimeout(startTrace, 100);
      });

    })();
  </script>
</body>
</html>
