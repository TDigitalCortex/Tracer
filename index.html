<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tracer · KanjiVgAnimate Actual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      padding: 2rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      padding-left: 1rem;
      border-left: 3px solid #94a3b8;
    }
    .canvas-wrapper {
      background: #f8fafc;
      border-radius: 20px;
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
      position: relative;
      min-height: 400px;
    }
    #tracerCanvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 800 / 400;
      background: #ffffff;
      border-radius: 16px;
      cursor: default;
      touch-action: none;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .input-group {
      flex: 2 1 300px;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-group label {
      font-weight: 500;
      color: #1e293b;
      font-size: 0.95rem;
    }
    .input-group input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
      min-width: 120px;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-primary {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
    }
    .btn-primary:hover { background: #0f172a; border-color: #0f172a; }
    .btn-secondary {
      background: #f1f5f9;
      border-color: #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: #64748b;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .status-badge {
      background: #f1f5f9;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-weight: 450;
    }
    .legend {
      display: flex;
      gap: 1rem;
      align-items: center;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-start { background: #22c55e; }
    .dot-end { background: #ef4444; }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .input-group { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ Letter Tracer</h1>
    <div class="subhead">Actual KanjiVgAnimate library · SVG stroke animation</div>
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="tracerCanvas" width="800" height="400"></canvas>
    </div>
    <div class="controls">
      <div class="input-group">
        <label for="wordInput">Text</label>
        <input type="text" id="wordInput" placeholder="e.g. ABC, hello" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="traceBtn">▶ Trace</button>
        <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-badge" id="statusLabel">⏺ Ready</span>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-start"></span> Start</span>
        <span class="legend-item"><span class="dot dot-end"></span> End</span>
        <span class="legend-item">🔢 Stroke order</span>
      </div>
    </div>
  </div>

  <!-- Load KanjiVgAnimate library from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/kanjivganimate@0.2.1/dist/kanjivganimate.min.js"></script>
  
  <script>
    (function() {
      // ============================================================
      // USING ACTUAL KANJIVGANIMATE LIBRARY - CORRECT APPROACH
      // ============================================================
      
      const canvas = document.getElementById('tracerCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const wrapper = document.getElementById('canvasWrapper');

      // ----- State -----
      let currentSVG = null;
      let animator = null;
      let isAnimating = false;

      // ----- SVG Path data for letters (KanjiVG style) -----
      const letterSVG = {
        // UPPERCASE A-Z
        'A': ['M25,85 L40,15 L55,85', 'M32,55 L48,55'],
        'B': ['M20,15 L20,85', 'M20,25 C35,25 50,25 55,35 C60,45 55,55 45,55 C55,55 60,65 55,75 C50,85 35,85 20,85'],
        'C': ['M65,25 C55,15 35,15 25,20 C15,25 10,45 15,65 C20,80 40,85 55,80 C65,75 70,60 70,50'],
        'D': ['M20,15 L20,85', 'M20,25 C40,25 60,25 65,45 C70,65 60,85 40,85 C25,85 20,85 20,85'],
        'E': ['M20,15 L60,15', 'M20,15 L20,85', 'M20,50 L50,50', 'M20,85 L60,85'],
        'F': ['M20,15 L60,15', 'M20,15 L20,85', 'M20,50 L50,50'],
        'G': ['M65,25 C55,15 35,15 25,20 C15,25 10,45 15,65 C20,80 40,85 55,80 C65,75 70,60 70,50', 'M65,50 L45,50', 'M45,50 L45,40'],
        'H': ['M20,15 L20,85', 'M55,15 L55,85', 'M20,50 L55,50'],
        'I': ['M15,15 L65,15', 'M40,15 L40,85', 'M15,85 L65,85'],
        'J': ['M65,15 L65,60 C65,75 55,85 40,85 C25,85 15,75 15,60', 'M15,15 L15,30'],
        'K': ['M20,15 L20,85', 'M20,50 C35,40 50,25 60,15', 'M20,50 C35,60 50,75 60,85'],
        'L': ['M20,15 L20,85', 'M20,85 L60,85'],
        'M': ['M15,15 L15,85', 'M15,15 C25,40 35,55 40,55', 'M40,55 C45,55 55,40 65,15', 'M65,15 L65,85'],
        'N': ['M20,15 L20,85', 'M20,15 C35,35 50,60 60,85', 'M60,15 L60,85'],
        'O': ['M40,15 C20,15 10,35 15,55 C20,75 40,85 60,80 C75,75 80,55 75,35 C70,20 50,15 40,15'],
        'P': ['M20,15 L20,85', 'M20,25 C40,25 60,25 65,45 C70,60 60,65 40,65 C25,65 20,65 20,65'],
        'Q': ['M40,15 C20,15 10,35 15,55 C20,75 40,85 60,80 C75,75 80,55 75,35 C70,20 50,15 40,15', 'M60,65 L75,80'],
        'R': ['M20,15 L20,85', 'M20,25 C40,25 60,25 65,45 C70,60 60,65 40,65 C25,65 20,65 20,65', 'M45,65 L65,85'],
        'S': ['M65,25 C55,15 35,15 25,20 C15,30 15,45 25,50 C40,55 50,60 55,70 C60,80 45,85 25,80 C15,75 10,65 10,60'],
        'T': ['M10,15 L70,15', 'M40,15 L40,85'],
        'U': ['M20,15 L20,60 C20,75 30,85 45,85 C60,85 70,75 70,60 L70,15'],
        'V': ['M10,15 C25,50 35,75 40,85 C45,75 55,50 70,15'],
        'W': ['M10,15 C20,40 25,60 30,70 C35,60 40,40 45,45 C50,40 55,60 60,70 C65,60 70,40 80,15'],
        'X': ['M20,15 C35,40 45,65 60,85', 'M60,15 C45,40 35,65 20,85'],
        'Y': ['M10,15 C25,40 35,55 40,60', 'M40,60 C45,55 55,40 70,15', 'M40,60 L40,85'],
        'Z': ['M10,15 L70,15', 'M70,15 C50,40 30,65 10,85', 'M10,85 L70,85'],
        ' ': []
      };

      // ----- Generate SVG from text -----
      function generateSVG(text) {
        if (!text) return '';
        const words = text.split(' ');
        let xOffset = 30;
        const yBase = 55;
        const charWidth = 45;
        const gap = 20;
        const maxWidth = W - 40;

        // Calculate scaling
        let totalWidth = 0;
        for (let w of words) {
          totalWidth += w.length * charWidth + (w.length - 1) * 6;
        }
        totalWidth += (words.length - 1) * gap;
        let scaleFactor = 1;
        if (totalWidth > maxWidth) scaleFactor = maxWidth / totalWidth;

        let paths = [];
        let strokeCounter = 0;

        for (let wIdx = 0; wIdx < words.length; wIdx++) {
          const word = words[wIdx];
          for (let chIdx = 0; chIdx < word.length; chIdx++) {
            const ch = word[chIdx];
            const strokePaths = letterSVG[ch] || letterSVG['A'];
            
            for (let sIdx = 0; sIdx < strokePaths.length; sIdx++) {
              const pathData = strokePaths[sIdx];
              // Transform the path data with translation and scaling
              const transformed = pathData.replace(/([MLCQA])([^MLCQA]*)/g, (match, cmd, coords) => {
                const nums = coords.trim().split(/[\s,]+/).filter(n => n !== '').map(Number);
                const scaled = nums.map((n, i) => {
                  const val = n * scaleFactor * 0.8;
                  if (i % 2 === 0) {
                    return val + xOffset + 20;
                  } else {
                    return val + yBase + 20;
                  }
                });
                return cmd + scaled.join(' ');
              });
              paths.push(transformed);
              strokeCounter++;
            }
            xOffset += charWidth * scaleFactor * 0.8 + 8;
          }
          if (wIdx < words.length - 1) xOffset += gap * scaleFactor;
        }

        // Build SVG string with proper structure for kanjivganimate
        return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" class="kanjiVG" style="width:100%;height:100%;display:block;">
          <g style="fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke:#1e293b;">
            ${paths.map((d, i) => `<path d="${d}" data-stroke="${i+1}" />`).join('')}
          </g>
        </svg>`;
      }

      // ----- Render using KanjiVgAnimate library -----
      function renderWithKanjiVgAnimate(text) {
        // Clear previous animation
        if (animator) {
          // Remove old SVG
          const oldSVG = wrapper.querySelector('svg');
          if (oldSVG) oldSVG.remove();
          animator = null;
        }
        isAnimating = false;

        const rawText = text || document.getElementById('wordInput').value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const svgString = generateSVG(rawText);
        
        if (!svgString) {
          ctx.clearRect(0, 0, W, H);
          document.getElementById('statusLabel').textContent = '⏺ No strokes';
          return;
        }

        // Insert SVG into the wrapper
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = svgString;
        const svgElement = tempDiv.querySelector('svg');
        svgElement.style.width = '100%';
        svgElement.style.height = '100%';
        svgElement.style.display = 'block';
        
        // Clear wrapper and add SVG
        wrapper.innerHTML = '';
        wrapper.appendChild(svgElement);

        // Also keep canvas for background
        wrapper.appendChild(canvas);
        canvas.style.position = 'absolute';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.opacity = '0'; // Hide canvas, SVG handles rendering

        // Initialize KanjiVgAnimate on the SVG
        try {
          animator = new KanjivgAnimate('.kanjiVG', 500);
          isAnimating = true;
          document.getElementById('statusLabel').textContent = '▶ Animating...';
          
          // Monitor animation completion
          const checkComplete = setInterval(() => {
            if (!isAnimating) {
              clearInterval(checkComplete);
              return;
            }
            // Check if all strokes are complete by looking at SVG paths
            const paths = svgElement.querySelectorAll('path');
            let allComplete = true;
            paths.forEach(path => {
              const dashoffset = path.style.strokeDashoffset;
              if (dashoffset && parseFloat(dashoffset) > 1) {
                allComplete = false;
              }
            });
            if (allComplete && paths.length > 0) {
              isAnimating = false;
              document.getElementById('statusLabel').textContent = '✅ Complete · all strokes traced';
              clearInterval(checkComplete);
            }
          }, 100);
        } catch (e) {
          console.warn('KanjiVgAnimate error:', e);
          document.getElementById('statusLabel').textContent = '⚠️ Animation error';
          // Fallback: just show the SVG
          isAnimating = false;
        }
      }

      // ----- Public functions -----
      function startTrace(text) {
        renderWithKanjiVgAnimate(text);
      }

      function clearTrace() {
        if (animator) {
          const svg = wrapper.querySelector('svg');
          if (svg) svg.remove();
          animator = null;
        }
        isAnimating = false;
        ctx.clearRect(0, 0, W, H);
        canvas.style.opacity = '1';
        canvas.style.position = 'relative';
        document.getElementById('statusLabel').textContent = '⏺ Cleared';
        // Redraw grid on canvas
        drawGrid();
      }

      function resetTrace() {
        const input = document.getElementById('wordInput');
        startTrace(input.value);
      }

      function drawGrid() {
        ctx.save();
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < W; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, H);
          ctx.stroke();
        }
        for (let i = 0; i < H; i += 40) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(W, i);
          ctx.stroke();
        }
        ctx.restore();
      }

      // ----- UI -----
      document.getElementById('traceBtn').addEventListener('click', () => startTrace(document.getElementById('wordInput').value));
      document.getElementById('clearBtn').addEventListener('click', clearTrace);
      document.getElementById('resetBtn').addEventListener('click', resetTrace);
      document.getElementById('wordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); startTrace(e.target.value); }
      });

      // Initial load
      window.addEventListener('load', () => {
        document.getElementById('wordInput').value = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        // Draw initial grid
        drawGrid();
        // Start trace after a small delay to ensure DOM is ready
        setTimeout(() => {
          startTrace('ABCDEFGHIJKLMNOPQRSTUVWXYZ');
        }, 100);
      });
    })();
  </script>
</body>
</html>
